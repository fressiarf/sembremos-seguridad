name: Sembremos Seguridad CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-backend:
    name: Backend Tests (Node.js & MySQL)
    runs-on: ubuntu-latest

    # Levanta una base de datos MySQL efímera para los tests de Sequelize
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_msp_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run Backend Tests
      working-directory: ./backend
      env:
        NODE_ENV: test
        DB_MSP_NAME: db_msp_test
        DB_MSP_USER: root
        DB_MSP_PASS: root
        DB_MSP_HOST: 127.0.0.1
        DB_MSP_PORT: 3306
        JWT_SECRET: testing_secret
      run: npm test

  test-frontend:
    name: Frontend Build & Linter
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Build
      working-directory: ./frontend
      run: npm run build
